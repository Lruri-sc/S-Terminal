<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>chloe-term</title>
  <style>
    /* ------------------------------------------- */
    /* CSS 变量定义 (被 main.js 读取的配置覆盖) */
    /* ------------------------------------------- */
    :root {
        --font-family: "Faraco Hand", "Sue Ellen Francisco", sans-serif;
        --font-size: 22px;
        --line-height: 1.3;
        --cursor-width: 10px;
        --cursor-height: 20px;
        --cursor-translateY: -5px;
        --text-color: #000000;
        --bg-color: #ffffff;
        --bg-image: none;
        --bg-size: auto auto; /* 背景图片尺寸，将由 JS 根据 DPI 计算 */
    }

    /* ------------------------------------------- */
    /* 布局和滚动修复 (使用 Flexbox 保证点击和滚动稳定) */
    /* ------------------------------------------- */
    html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh; /* Flex 容器基准 */
        overflow: hidden; /* 隐藏主滚动条 */
    }
    
    body {
        padding: 15px 20px;
        background-color: var(--bg-color);
        /* 背景图片设置：使用变量控制尺寸 */
        background-image: var(--bg-image);
        background-repeat: repeat;
        background-size: var(--bg-size);     /* 根据 DPI 动态调整 */
        background-position: 0 0;
        background-attachment: scroll;
        image-rendering: pixelated;          /* 像素化渲染，避免模糊 */
        box-sizing: border-box;
        cursor: text;
        
        display: flex;
        flex-direction: column;
        
        will-change: transform;
        transform: translate3d(0, 0, 0); 
    }

    #terminal-container {
        content-visibility: auto;
        contain: layout paint;
        
        flex-grow: 1; /* 占据 body 中所有剩余高度 */
        overflow-y: auto; /* 终端容器内部出现滚动条 (解决滚动跟踪问题) */
        
        display: flex;
        flex-direction: column; 
        align-items: flex-start;
        
        font-family: var(--font-family); 
        font-size: var(--font-size);     
        line-height: var(--line-height); 
        color: var(--text-color);        
        user-select: none;
    }

    #history-container {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    .history-line {
        white-space: pre-wrap; 
        word-wrap: break-word;
        word-break: break-all;
        margin: 2px 0; 
    }

    #active-line-container {
        display: inline-flex;
        flex-direction: row;
        align-items: flex-end; 
        flex-wrap: wrap;
        margin-top: 2px;
        width: 100%;
    }

    #current-line {
        white-space: pre-wrap;
        word-wrap: break-word;
        word-break: break-all;
        line-height: var(--line-height);
        overflow-wrap: break-word;
        max-width: 100%;
    }

    .cursor {
        display: block;
        width: var(--cursor-width);        
        height: var(--cursor-height);       
        background-color: #444;
        margin-left: 2px;
        margin-bottom: 0; 
        transform: translateY(var(--cursor-translateY)); 
        animation: blink 1s step-end infinite;
    }
    
    @keyframes blink { 
        0%, 100% { opacity: 1; }
        50% { opacity: 0; } 
    }

    /* 隐藏输入框：使用 clip 隐藏，并防止滚动干扰 (解决点击回到顶部问题) */
    #hidden-input {
        position: absolute; 
        clip: rect(0, 0, 0, 0); 
        width: 1px;
        height: 1px;
        top: auto; 
        left: 0;
        overflow: hidden; 
        z-index: -1; 
    }

    #terminal-container::-webkit-scrollbar { 
        width: 0px; 
        background: transparent; 
    }
  </style>
</head>
<body>
  <div id="terminal-container">
    <div id="history-container"></div>
    <div id="active-line-container">
        <div id="current-line"></div><div class="cursor"></div>
    </div>
  </div>
  
  <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus 
     autofocus="true" onfocus="this.scrollIntoView({behavior: 'instant'})" />

  <script>
    const { ipcRenderer } = require('electron');
    const Convert = require('ansi-to-html');
    
    const convert = new Convert({ 
      newline: false, 
      escapeXML: true,
      fg: '#000', 
      bg: '#fff',
      colors: {
        0: '#000000',
        1: '#ff0000',
        2: '#00ff00',
        3: '#ffff00',
        4: '#0000ff',
        5: '#ff00ff',
        6: '#00ffff',
        7: '#ffffff',
        8: '#808080',
        9: '#ff0000',
        10: '#00ff00',
        11: '#ffff00',
        12: '#0000ff',
        13: '#ff00ff',
        14: '#00ffff',
        15: '#ffffff'
      }
    });

    const historyContainer = document.getElementById('history-container');
    const currentLineSpan = document.getElementById('current-line');
    const hiddenInput = document.getElementById('hidden-input');
    const terminalContainer = document.getElementById('terminal-container'); 
    
    let currentLineBuffer = ""; 
    let renderRequested = false;
    let pendingCR = false; 
    let inCsiSequence = false; 
    let isComposing = false;
    
    // -------------------------------------------------------------------------
    // 核心函数
    // -------------------------------------------------------------------------

    function safeBackspace(text) {
        if (text.length === 0) return text;
        const trailingAnsiRegex = /((?:\x1b\[[0-9;]*m)+)$/;
        const match = text.match(trailingAnsiRegex);
        let suffix = "";
        let content = text;
        if (match) {
            suffix = match[1];
            content = text.slice(0, -suffix.length);
        }
        if (content.length > 0) {
            content = content.slice(0, -1);
        }
        return content + suffix;
    }

    function updateDisplay() {
        if (renderRequested) {
            currentLineSpan.innerHTML = convert.toHtml(currentLineBuffer);
            renderRequested = false;
        }
        requestAnimationFrame(updateDisplay);
    }
    requestAnimationFrame(updateDisplay);

    function scrollToBottom() {
        if (!terminalContainer) return;
        
        // 🔧 修复：始终滚动到底部，不做距离判断
        // 确保命令输出超出窗口时能自动跟随到最新内容
        requestAnimationFrame(() => {
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        });
    }

    function performClear() {
        historyContainer.innerHTML = ''; 
        currentLineBuffer = '';
        currentLineSpan.innerHTML = '';
        pendingCR = false;
        if (terminalContainer) terminalContainer.scrollTop = 0; 
    }
    
    function getWindowSize() {
        const computedStyle = getComputedStyle(document.documentElement);
        
        const fontSizeStr = computedStyle.getPropertyValue('--font-size').trim();
        const lineHeightStr = computedStyle.getPropertyValue('--line-height').trim();
        
        const fontSize = parseFloat(fontSizeStr);
        const lineHeight = parseFloat(lineHeightStr);

        if (isNaN(fontSize) || fontSize <= 0 || isNaN(lineHeight) || lineHeight <= 0) return;
        
        const cols = Math.max(20, Math.floor((window.innerWidth - 40) / (fontSize * 0.55))); 
        const rows = Math.max(10, Math.floor((window.innerHeight - 30) / (fontSize * lineHeight)));
        
        if (cols > 0 && rows > 0) {
            ipcRenderer.send('resize-terminal', { cols: cols, rows: rows });
        }
    }
    
    // 使用防抖优化 resize 事件
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            getWindowSize();
        }, 100);
    });

    // -------------------------------------------------------------------------
    // 事件监听器
    // -------------------------------------------------------------------------

    if (terminalContainer) {
        terminalContainer.addEventListener('click', () => {
            hiddenInput.focus();
        });
    }
    window.addEventListener('focus', () => hiddenInput.focus()); 

    // 接收主进程的配置，应用设置和同步尺寸
    ipcRenderer.on('apply-settings', (event, settings) => {
        const root = document.documentElement;
        root.style.setProperty('--font-family', settings.fontFamily);
        root.style.setProperty('--font-size', settings.fontSize);
        root.style.setProperty('--line-height', settings.lineHeight);
        root.style.setProperty('--cursor-width', settings.cursorWidth);
        root.style.setProperty('--cursor-height', settings.cursorHeight);
        root.style.setProperty('--cursor-translateY', settings.cursorTranslateY);
        
        // 应用文字颜色和背景颜色
        root.style.setProperty('--text-color', settings.textColor);
        document.body.style.backgroundColor = settings.backgroundColor;
        
        // 应用背景图片
        if (settings.backgroundImage && settings.backgroundImage.trim() !== '') {
            root.style.setProperty('--bg-image', `url("${settings.backgroundImage}")`);
            
            // 计算背景图片的实际显示尺寸（补偿 DPI 缩放）
            const dpr = window.devicePixelRatio || 1;
            console.log('[DEBUG] Device Pixel Ratio:', dpr);
            
            // 加载图片获取原始尺寸
            const img = new Image();
            img.onload = function() {
                console.log('[DEBUG] Image original size:', img.width, 'x', img.height);
                
                // 计算 CSS 尺寸：原始像素 / DPR
                const cssWidth = img.width / dpr;
                const cssHeight = img.height / dpr;
                
                console.log('[DEBUG] CSS size:', cssWidth, 'x', cssHeight);
                
                root.style.setProperty('--bg-size', `${cssWidth}px ${cssHeight}px`);
            };
            img.src = settings.backgroundImage;
        } else {
            root.style.setProperty('--bg-image', 'none');
            root.style.setProperty('--bg-size', 'auto auto');
        }
        
        // 触发尺寸同步
        requestAnimationFrame(() => {
            getWindowSize(); 
        });
    });

    ipcRenderer.on('terminal-incoming', (event, data) => {
      data = data.replace(/\x1b\][\s\S]*?\x07/g, ''); 
      data = data.replace(/\x1b\[\?2004[hl]/g, '');
      data = data.replace(/\x07/g, ''); 
      data = data.replace(/\x1b\[\d*[ABCD]/g, ''); 
      data = data.replace(/\x1b\[H/g, '\x00');
      data = data.replace(/\x1b\[\d*G/g, '\x00');
      while (data.includes('\x08 \x20 \x08')) {
          data = data.replaceAll('\x08 \x20 \x08', '\x08');
      }
      data = data.replace(/\x7f/g, '\x08');
      if (data.includes('\x1b[2J') || data.includes('\x1b[3J')) {
          performClear(); 
          data = data.replace(/\x1b\[[23]J/g, '');
      }
      data = data.replace(/\x1b\[[0-9;]*K/g, '');

      for (let i = 0; i < data.length; i++) {
        const char = data[i];
        if (char === '\x00') {
            currentLineBuffer = "";
            pendingCR = false;
            continue;
        }
        if (char === '\x1b') {
            if (pendingCR) {
                currentLineBuffer = "";
                pendingCR = false;
            }
            if (data[i+1] === '[') inCsiSequence = true;
        }
        if (inCsiSequence) {
            currentLineBuffer += char;
            if (/[a-zA-Z]/.test(char)) inCsiSequence = false;
            continue;
        }
        if (char === '\x1b') continue;
        
        if (char === '\n') {
            const newLine = document.createElement('div');
            newLine.className = 'history-line';
            const html = convert.toHtml(currentLineBuffer);
            newLine.innerHTML = html.trim() === '' ? '&nbsp;' : html;
            historyContainer.appendChild(newLine);
            
            if (historyContainer.children.length > 300) {
                historyContainer.removeChild(historyContainer.firstChild);
            }
            
            renderRequested = true; 
            scrollToBottom(); 

            currentLineBuffer = "";
            pendingCR = false;
            continue;
        }

        if (char === '\r') {
            pendingCR = true;
            continue;
        }
        if (pendingCR) {
            currentLineBuffer = ""; 
            pendingCR = false;
        }
        if (char === '\x08') { 
            currentLineBuffer = safeBackspace(currentLineBuffer);
            renderRequested = true; 
        } else {
            currentLineBuffer += char;
            renderRequested = true; 
        }
      }
      renderRequested = true;
      scrollToBottom(); 
    });

    hiddenInput.addEventListener('compositionstart', () => {
        isComposing = true;
    });

    hiddenInput.addEventListener('compositionend', (e) => {
        isComposing = false;
        if (e.data) {
            ipcRenderer.send('terminal-keystroke', e.data);
        }
        hiddenInput.value = '';
        scrollToBottom(); 
    });

    hiddenInput.addEventListener('input', (e) => {
        if (isComposing) return;
        if (e.inputType === 'insertCompositionText') return;

        if (e.data) {
            ipcRenderer.send('terminal-keystroke', e.data);
        }
        hiddenInput.value = '';
    });

    hiddenInput.addEventListener('keydown', (e) => {
      if (isComposing) return;
      const key = e.key;
      
      // Ctrl+C
      if (e.ctrlKey && key === 'c') {
        ipcRenderer.send('terminal-keystroke', '\x03');
        e.preventDefault();
        return;
      }
      
      // Cmd+V 或 Ctrl+V - 粘贴
      if ((e.metaKey || e.ctrlKey) && key === 'v') {
        navigator.clipboard.readText().then(text => {
          if (text) {
            ipcRenderer.send('terminal-keystroke', text);
          }
        }).catch(err => {
          console.error('Failed to read clipboard:', err);
        });
        e.preventDefault();
        return;
      }
      
      const map = {
          'Enter': '\r', 
          'Backspace': '\x7f', 
          'Tab': '\t',
          'ArrowUp': '\x1b[A', 
          'ArrowDown': '\x1b[B', 
          'ArrowLeft': '\x1b[D', 
          'ArrowRight': '\x1b[C'
      };
      if (map[key]) {
          ipcRenderer.send('terminal-keystroke', map[key]);
          if (key === 'Tab' || key === 'ArrowUp' || key === 'ArrowDown') {
            e.preventDefault(); 
          }
      }
    });

  </script>
</body>
</html>
